version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: demo-backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      SQLITE_PATH: /app/data/data.sqlite
    ports:
      - "3001:3001"
    volumes:
      - /srv/ai-chat/data:/app/data

  frontend:
    build:
      context: ./frontend
    container_name: demo-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
